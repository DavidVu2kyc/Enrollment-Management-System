# ================================================================
# OBU Enrollment Management System — Application Configuration
# ================================================================

# --- Server ---
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# --- Database (PostgreSQL - Docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=mysecretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# --- JWT ---
app.jwt.secret=yourVeryStrongSecretKeyHere123456789
app.jwt.expiration=86400000

# --- SpringDoc / Swagger UI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173
#Test container
testcontainers.reuse.enable=true

# Swagger UI (interactive web interface): http://localhost:8081/swagger-ui.html
# OpenAPI JSON spec: http://localhost:8081/v3/api-docs
# OpenAPI YAML spec: http://localhost:8081/v3/api-docs.yaml